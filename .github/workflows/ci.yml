name: ci

# Keeps the card generator green: line-length (80), pyflakes, and tests.
on:
  push:
    paths:
      - "src/**"
      - "tests/**"
      - "pyproject.toml"
      - ".github/workflows/ci.yml"
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pillow ruff black pytest

      - name: Lint (ruff: line-length 80 + pyflakes)
        run: ruff check src tests

      - name: Format check (black: line-length 80)
        run: black --check src tests

      - name: Tests
        run: pytest -q
